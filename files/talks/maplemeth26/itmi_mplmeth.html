name: puzzle

## Puzzle

--

1. Poor fit between the different measures of inattention (IMC, response time, response pattern) &lt;a name=cite-dunn2018intra&gt;&lt;/a&gt;&lt;a name=cite-desimone2018dirty&gt;&lt;/a&gt;([Dunn, Heggestad, Shanock, and Theilgard, 2018](#bib-dunn2018intra); [DeSimone and Harms, 2018](#bib-desimone2018dirty));

--

2. Validation of measures is done via nomological validity, testing against established measures &lt;a name=cite-adcock2001measurement&gt;&lt;/a&gt;([Adcock and Collier, 2001](#bib-adcock2001measurement));

--

3. Conceptual confusion among foundational studies &lt;a name=cite-oppenheimer2009instructional&gt;&lt;/a&gt;&lt;a name=cite-meade2012identifying&gt;&lt;/a&gt;&lt;a name=cite-huang2012detecting&gt;&lt;/a&gt;([Oppenheimer, Meyvis, and Davidenko, 2009](#bib-oppenheimer2009instructional); [Meade and Craig, 2012](#bib-meade2012identifying); [Huang, Curran, Keeney, Poposki, and DeShon, 2012](#bib-huang2012detecting));

--

4. Advice is to carpet bomb the survey &lt;a name=cite-curran2016methods&gt;&lt;/a&gt;&lt;a name=cite-huang2015detecting&gt;&lt;/a&gt;([Curran, 2016](#bib-curran2016methods); [Huang, Bowling, Liu, and Li, 2014](#bib-huang2015detecting); [Meade and Craig, 2012](#bib-meade2012identifying));

--

5. At the end of the day, we still can't say whether the poor fit is due to the measures capturing different concepts, or because they are inappropriate.

--

.purplebL[What is the validity of current measures of inattention in survey research?] **... and what would be an appropriate test?**

## Concept

.large[ `\(\boldsymbol\mapsto\)` We define inattentive responding (IR) as a failing to follow one or multiple of
these steps due to a lack of **motivation** or **ability**.]

Formally:

`$$IR_i = M_i\times A_i= 
\left\lbrace\begin{align}
&amp;1 \quad \mathrm{if}\; M_i=0\lor A_i=0 \\ 
&amp;0 \quad \mathrm{if}\; M_i=1\land A_i=1
\end{align}\right.$$`

.footnote[&lt;a name=cite-anduiza2017answering&gt;&lt;/a&gt;&lt;a name=cite-berinsky2024measuring&gt;&lt;/a&gt;([Anduiza and Galais, 2017](#bib-anduiza2017answering); [Berinsky, Frydman, Margolis, Sances, and Valerio, 2024](#bib-berinsky2024measuring))]

## Measures — The classics

.panelset[
  .panel[.panel-name[Direct]
  - **Provide snapshot assessments!**
  - Intructional Manipulation Checks (IMC):
    - "[...] Forget previous instructions and choose 'Strongly Agree'."
    - Can be more or less overt.
  - Bogus/Infrequency items:
    - "I am paid biweekly by leprechauns."
    - Covert
  - Factual Manipulation Checks (FMC)/Mock Vignette Checks (MVC):
    - For experimental designs, to check treatment compliance.
    
  .small[&lt;a name=cite-kane2019no&gt;&lt;/a&gt;&lt;a name=cite-mancosu2019short&gt;&lt;/a&gt;&lt;a name=cite-kane2023analyze&gt;&lt;/a&gt;([Oppenheimer, Meyvis, and Davidenko, 2009](#bib-oppenheimer2009instructional); [Meade and Craig, 2012](#bib-meade2012identifying); [Kane and Barabas, 2019](#bib-kane2019no); [Mancosu, Ladini, and Vezzoni, 2019](#bib-mancosu2019short); [Kane, Velez, and Barabas, 2023](#bib-kane2023analyze))]
  ]
  .panel[.panel-name[Response time]
  - **Offers global assessment!**
  - Page time indices:
    - Ad hoc threshold (2 seconds per question);
    - Concerned with respondents going too fast.
  - Response Time Attentiveness Clustering (RTAC):
    - 2 steps:  1) PCA; 2) EM clustering.
    - Gives probability of being in each of three clusters:
      1. Fast inattentive;
      2. Attentive;
      3. Slow inattentive.
      
   .small[&lt;a name=cite-bowling2021quick&gt;&lt;/a&gt;&lt;a name=cite-read2022racing&gt;&lt;/a&gt;([Huang, Curran, Keeney et al., 2012](#bib-huang2012detecting); [Bowling, Huang, Brower, and Bragg, 2021](#bib-bowling2021quick); [Read, Wolters, and Berinsky, 2022](#bib-read2022racing))]
  ]
  .panel[.panel-name[Response pattern]
  - **Offers global assessment!**
  - Longest streak
  - Outlier detection
  - Individual consistency
  
`\(\mapsto\)` Not recommended as offer poor consistency with other measures and are overreliant on strong assumptions.
  
  .small[&lt;a name=cite-converse2006nature&gt;&lt;/a&gt;([Curran, 2016](#bib-curran2016methods); [DeSimone and Harms, 2018](#bib-desimone2018dirty); [Converse, 2006](#bib-converse2006nature))]
  ]
]

## Measures — Physiology

.panelset[
  .panel[.panel-name[Eye-tracking]
  - Infrared sensors used to track gaze time in area of interest.
  - Assumption that where you look is where attention is.
  - Used to measure task engagement &lt;a name=cite-fortenbaugh2017recent&gt;&lt;/a&gt;&lt;a name=cite-baumgartner2018misresponse&gt;&lt;/a&gt;([Fortenbaugh, DeGutis, and Esterman, 2017](#bib-fortenbaugh2017recent); [Baumgartner, Weijters, and Pieters, 2018](#bib-baumgartner2018misresponse)).
  - Used to investigate answer ordering effects, and conjoint experiment assumptions &lt;a name=cite-galesic2008eye&gt;&lt;/a&gt;&lt;a name=cite-jenke2021using&gt;&lt;/a&gt;([Galesic, Tourangeau, Couper, and Conrad, 2008](#bib-galesic2008eye); [Jenke, Bansak, Hainmueller, and Hangartner, 2021](#bib-jenke2021using)).
  - &lt;a name=cite-babakhani2023instructional&gt;&lt;/a&gt;[Babakhani, Paas, and Dolnicar (2023)](#bib-babakhani2023instructional) provides the only study that directly tests the validity of IMCs on physiological manifestations of attention (n=21). 
    - Find that task miscomprehension is also to blame for IMC failure.
&lt;img src="itmi_mplmeth_files/figure-html/unnamed-chunk-8-1.png" width="60%" style="display: block; margin: auto;" /&gt;
  ]
  .panel[.panel-name[EDA]
  - Electrodermal activity (skin conductance) varies as a function of sweat production.
  - Eccrine sweat gland activation part of sympathetic nervous system (the fight-or-flight response).
  - Associated with a wide array of states: arousal, stress, motivation, vigilance, etc. &lt;a name=cite-andreassi2000activity&gt;&lt;/a&gt;([Andreassi, 2000](#bib-andreassi2000activity)).
  - If treatment produces stress response, might be difficult to parse out what exactly made EDA increase.
  - Successfully used to measure vigilance &lt;a name=cite-eason1965performance&gt;&lt;/a&gt;&lt;a name=cite-krupski1971physiological&gt;&lt;/a&gt;&lt;a name=cite-tao2019systematic&gt;&lt;/a&gt;&lt;a name=cite-brishtel2020mind&gt;&lt;/a&gt;([Eason, Beardshall, and Jaffee, 1965](#bib-eason1965performance); [Krupski, Raskin, and Bakan, 1971](#bib-krupski1971physiological); [Tao, Tan, Wang, Zhang, Qu, and Zhang, 2019](#bib-tao2019systematic); [Brishtel, Khan, Schmidt, Dingler, Ishimaru, and Dengel, 2020](#bib-brishtel2020mind)).
&lt;img src="itmi_mplmeth_files/figure-html/unnamed-chunk-9-1.png" width="60%" style="display: block; margin: auto;" /&gt;
  ]
  .panel[.panel-name[HRV]
  - Heart rate variation corresponds to the variation in the interval between heart beats, is it consistent or not.
  - Associated with global cognitive performance, memory, language, **attention**, executive functions, visuospatial skills, and processing speed &lt;a name=cite-forte2019heart&gt;&lt;/a&gt;([Forte, Favieri, and Casagrande, 2019](#bib-forte2019heart)).
  - Lower HRV during attention phases &lt;a name=cite-richards1991heart&gt;&lt;/a&gt;&lt;a name=cite-chen2010detecting&gt;&lt;/a&gt;&lt;a name=cite-williams2016resting&gt;&lt;/a&gt;&lt;a name=cite-griffiths2017sustained&gt;&lt;/a&gt;([Richards and Casey, 1991](#bib-richards1991heart); [Chen, Wang, Chen, Wu, Yang, Wang, and Chung, 2010](#bib-chen2010detecting); [Williams, Thayer, and Koenig, 2016](#bib-williams2016resting); [Griffiths, Quintana, Hermens, Spooner, Tsang, Clarke, and Kohn, 2017](#bib-griffiths2017sustained)).
&lt;img src="itmi_mplmeth_files/figure-html/unnamed-chunk-10-1.png" width="60%" style="display: block; margin: auto;" /&gt;
  ]
]

## Design — Ideal Scenario

Recall our definition of IR:

`$$IR_i = M_i\times A_i= 
\left\lbrace\begin{align}
&amp;1 \quad \mathrm{if}\; M_i=0\lor A_i=0 \\ 
&amp;0 \quad \mathrm{if}\; M_i=1\land A_i=1
\end{align}\right.$$`

Let's describe a model of attention as a function of an external stimuli:

`$$\color{#FF0000}{IR_{mi}}=\beta_m D_{i}+\mathbf{X}\boldsymbol{\gamma_{m}}+\varepsilon_{mi}$$`
- `\(\color{#FF0000}{m}\)`:
  1. HRV;
  2. Eye-tracking;
  3. EDA;
  4. IMC index (overt, covert, bogus item);
  5. Response time index;
  6. RTAC.

&amp;0 \quad \mathrm{if}\; M_i=1\land A_i=1

Let's describe a model of attention as a function of an external stimuli:

`$$IR_{mi}=\color{#FF0000}{\beta_m D_{i}}+\mathbf{X}\boldsymbol{\gamma_{m}}+\varepsilon_{mi}$$`

name: conclusion

## Conclusion — What have we learned? 

- Assuming our gaze measure is right:
  1. IMCs are a bad way to measure inattention.
  2. RTAC is the closest in terms of ATE estimation (Potentially overestimating it).
  3. Within analysis confuses this trend.
  4. None of the measures scale well together.
